<div
  class="min-h-[3rem] flex w-full border-b border-gray-200 dark:border-gray-800 px-2 sm:px-10"
>
  <div
    class="absolute z-50 bg-slate-50 text-gray-700 rounded p-2 font-medium top-14 right-4 sm:right-14 drop-shadow-2xl flex flex-col gap-2 justify-center items-center transition-all duration-300 ease-out opacity-0 -translate-y-5 pointer-events-none"
  >
    <button
      class="hover:text-gray-100 hover:bg-gray-600 rounded px-3 py-2 transition-all duration-200 ease-in-out"
    >
      Profile</button
    ><button
      class="hover:text-gray-100 hover:bg-gray-600 rounded px-3 py-2 transition-all duration-200 ease-in-out"
    >
      Log out
    </button>
  </div>
  <nav class="flex h-full text-gray-600 dark:text-gray-400">
    <span
      class="cursor-pointer h-full border-b-2 inline-flex items-center mr-2 sm:mr-8 select-none border-transparent"
      >Export</span
    ><span
      class="cursor-pointer h-full border-b-2 inline-flex items-center mr-2 sm:mr-8 select-none border-transparent"
      >Import</span
    ><span
      class="cursor-pointer h-full border-b-2 inline-flex items-center mr-2 sm:mr-8 select-none border-transparent"
      >Batch</span
    >
  </nav>
  <div class="ml-auto flex items-center space-x-2 sm:space-x-7">
    <button
      class="h-8 px-3 rounded-md shadow text-white bg-blue-400 hover:bg-blue-500 transition-all duration-100 ease-in"
    >
      Refresh</button
    ><button class="flex items-center">
      <span class="relative flex-shrink-0"
        ><img
          class="w-7 h-7 rounded-full"
          src="/admin/sandeep.jpg"
          alt="profile" /><span
          class="absolute right-0 -mb-0.5 bottom-0 w-2 h-2 rounded-full bg-green-500 border border-white dark:border-gray-900"
        ></span></span
      ><span class="ml-2">Admin</span>
      <div class="transition-all ml-1 duration-200 ease-in-out">
        <svg
          viewBox="0 0 24 24"
          class="w-4 flex-shrink-0"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
    </button>
  </div>
</div>
